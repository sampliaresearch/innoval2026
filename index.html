<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" integrity="sha384-..." crossorigin="anonymous"></script>
</head>
<body data-theme="light">
    <header>
        <h1>Welcome to the Sample Page</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#" aria-label="Link to Home">Home</a></li>
            <li><a href="#" aria-label="Link to About">About</a></li>
            <li><a href="#" aria-label="Link to Contact">Contact</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Data Visualization</h2>
            <canvas id="heatmap"></canvas>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Sample Research</p>
    </footer>
    <script>
        // Dark mode detection
        const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        } else if (currentTheme === 'light') {
            document.body.setAttribute('data-theme', 'light');
        } else if (prefersDarkScheme.matches) {
            document.body.setAttribute('data-theme', 'dark');
        } else {
            document.body.setAttribute('data-theme', 'light');
        }

        // Heatmap chart
        const ctx = document.getElementById('heatmap').getContext('2d');
        const myHeatmap = new Chart(ctx, {
            type: 'heatmap',
            data: {
                // Sample data, replace with actual data
                labels: ['00:00', '01:00', '02:00', '03:00', '04:00', '05:00', '06:00', '07:00', '08:00', '09:00', '10:00', '11:00'],
                datasets: [{
                    data: [12, 19, 3, 5, 2, 3, 9, 6, 4, 7, 10, 8],
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    x: { display: true },
                    y: { display: true }
                }
            }
        });
    </script>
</body>
</html>
